{% extends "base.html" %}
{% block title %}Add Transaction{% endblock title %}
{% block content %}
<div class="min-h-screen flex items-center justify-center 
            bg-gradient-to-br from-gray-900 via-gray-800 to-black 
            py-12 px-4">

    <!-- Glass Card -->
    <div class="max-w-md w-full 
                bg-white/10 backdrop-blur-lg 
                p-8 rounded-2xl shadow-2xl 
                border border-white/20
                transition duration-500 hover:scale-[1.02] hover:shadow-[0_0_30px_rgba(255,255,255,0.2)]">

        <!-- Title -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-yellow-400 animate-pulse">
                Add Transaction 
            </h1>
            <p class="text-gray-300 text-sm mt-1">
                Record your income or expenses
            </p>
        </div>

        <!-- Form -->
        <form class="space-y-5" method="post">
            {% csrf_token %}

            <!-- Title -->
            <div>
                <label class="text-gray-300 text-sm font-semibold">Title</label>
                <input type="text" name="title"
                    class="w-full mt-1 p-3 rounded-lg bg-white/80 text-black 
                           focus:outline-none focus:ring-2 focus:ring-yellow-400 
                           transition duration-300 focus:scale-[1.02]"
                    placeholder="Salary, Rent..." required>
            </div>

            <!-- Amount -->
            <div>
                <label class="text-gray-300 text-sm font-semibold">Amount</label>
                <input type="number" name="amount" step="0.01"
                    class="w-full mt-1 p-3 rounded-lg bg-white/80 text-black 
                           focus:outline-none focus:ring-2 focus:ring-yellow-400 
                           transition duration-300 focus:scale-[1.02]"
                    placeholder="100.00" required>
            </div>

            <!-- Type -->
            <div>
                <label class="text-gray-300 text-sm font-semibold">Type</label>
                <select name="transaction_type"
                    class="w-full mt-1 p-3 rounded-lg bg-white/80 text-black 
                           focus:outline-none focus:ring-2 focus:ring-yellow-400 
                           transition duration-300">
                    <option disabled selected>Select type</option>
                    <option value="Income">Income</option>
                    <option value="Expense">Expense</option>
                </select>
            </div>

            <!-- Date -->
            <div>
                <label class="text-gray-300 text-sm font-semibold">Date</label>
                <input type="date" name="date" max="{% now 'Y-m-d' %}"
                    class="w-full mt-1 p-3 rounded-lg bg-white/80 text-black 
                           focus:outline-none focus:ring-2 focus:ring-yellow-400 
                           transition duration-300">
            </div>

            <!-- Category -->
            <div>
                <label class="text-gray-300 text-sm font-semibold">Category</label>
                <input type="text" name="category"
                    class="w-full mt-1 p-3 rounded-lg bg-white/80 text-black 
                           focus:outline-none focus:ring-2 focus:ring-yellow-400 
                           transition duration-300 focus:scale-[1.02]"
                    placeholder="Food, Rent..." required>
            </div>

            <!-- Button -->
            <button
                class="w-full bg-yellow-400 text-black font-bold py-3 rounded-lg 
                       transition duration-300 hover:scale-105 hover:bg-yellow-500 hover:shadow-lg">
                Add Transaction
            </button>

        </form>

        <!-- Back -->
        <div class="text-center mt-5">
            <a href="{% url 'home' %}"
               class="text-indigo-400 hover:text-indigo-200 text-sm transition underline">
                ← Back to Home
            </a>
        </div>

    </div>
</div>
{% endblock content %}
